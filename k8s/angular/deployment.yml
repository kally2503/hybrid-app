apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-app
  namespace: hybrid-app
  labels:
    app: angular-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: angular-app
  template:
    metadata:
      labels:
        app: angular-app
    spec:
      imagePullSecrets:
        - name: artifactory-registry-secret
      containers:
        - name: angular-app
          image: DOCKER_REGISTRY/hybrid-angular-app:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: angular-app
  namespace: hybrid-app
spec:
  selector:
    app: angular-app
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
