apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
  namespace: hybrid-app
  labels:
    app: java-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
        - name: java-app
          image: DOCKER_REGISTRY/hybrid-java-app:latest
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: "eks-production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: java-app
  namespace: hybrid-app
spec:
  selector:
    app: java-app
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
