version: '3.8'

services:
  java-app:
    build:
      context: ../apps/java-app
      dockerfile: Dockerfile
    container_name: hybrid-java-app
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=docker-local
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  python-app:
    build:
      context: ../apps/python-app
      dockerfile: Dockerfile
    container_name: hybrid-python-app
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=docker-local
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  angular-app:
    build:
      context: ../apps/angular-app
      dockerfile: Dockerfile
    container_name: hybrid-angular-app
    ports:
      - "4200:80"
    depends_on:
      - java-app
      - python-app
