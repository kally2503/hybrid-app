name: Hybrid App CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Detect what changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.filter.outputs.java }}
      angular: ${{ steps.filter.outputs.angular }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            java:
              - 'apps/java-app/**'
            angular:
              - 'apps/angular-app/**'
            python:
              - 'apps/python-app/**'
      - name: Debug filter outputs
        run: |
          echo "java=${{ steps.filter.outputs.java }}"
          echo "angular=${{ steps.filter.outputs.angular }}"
          echo "python=${{ steps.filter.outputs.python }}"

  # Build Java app (only if changed)
  build-java:
    needs: changes
    if: needs.changes.outputs.java == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'  # ← AUTO-CACHES ~/.m2 ⚡
          server-id: artifactory            # matches <id> in pom.xml distributionManagement
          server-username: MAVEN_USERNAME   # env var name, not value
          server-password: MAVEN_PASSWORD   # env var name, not value
      
      - name: Build with Maven
        run: |
          cd apps/java-app
          mvn clean package -DskipTests
      
      - name: Run Tests
        run: |
          cd apps/java-app
          mvn test
      
      - name: Upload to JFrog Artifactory
        env:
          ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
          MAVEN_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.ARTIFACTORY_TOKEN }}
        run: |
          # --- Diagnostic: verify secrets are wired (values masked) ---
          if [ -z "$ARTIFACTORY_URL" ]; then
            echo "::error::ARTIFACTORY_URL secret is EMPTY or not set. Set it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          if [ -z "$MAVEN_USERNAME" ]; then
            echo "::error::ARTIFACTORY_USERNAME secret is EMPTY or not set."
            exit 1
          fi
          if [ -z "$MAVEN_PASSWORD" ]; then
            echo "::error::ARTIFACTORY_TOKEN secret is EMPTY or not set."
            exit 1
          fi
          echo "ARTIFACTORY_URL length: ${#ARTIFACTORY_URL}"
          echo "MAVEN_USERNAME length: ${#MAVEN_USERNAME}"
          echo "MAVEN_PASSWORD length: ${#MAVEN_PASSWORD}"

          cd apps/java-app
          # Use altDeploymentRepository to bypass any ${env.X} interpolation
          # issues in pom.xml. The 'artifactory' id must match server-id in
          # setup-java, so ~/.m2/settings.xml credentials are used.
          mvn deploy -DskipTests \
            -DaltDeploymentRepository="artifactory::default::${ARTIFACTORY_URL}"
      
      - name: Log in to DockerHub
        env:
          DOCKER_USERNAME: kalaiadmin
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -z "$DOCKER_PASSWORD" ]; then
            echo "::error::DOCKER_PASSWORD secret is EMPTY or not set."
            exit 1
          fi
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            -t kalaiadmin/java-app:${{ github.sha }} \
            -t kalaiadmin/java-app:latest \
            -f apps/java-app/Dockerfile apps/java-app

      - name: Push to DockerHub
        run: |
          docker push kalaiadmin/java-app:${{ github.sha }}
          docker push kalaiadmin/java-app:latest

  # Build Angular app (only if changed)
  build-angular:
    needs: changes
    if: needs.changes.outputs.angular == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'  # ← AUTO-CACHES node_modules ⚡
          cache-dependency-path: 'apps/angular-app/package-lock.json'
      
      - name: Install Dependencies
        run: |
          cd apps/angular-app
          npm ci  # Faster than npm install
      
      - name: Build
        run: |
          cd apps/angular-app
          npm run build --prod
      
      - name: Run Tests
        run: |
          cd apps/angular-app
          npm test -- --watch=false --browsers=ChromeHeadless

  # Build Python app (only if changed)
  build-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'  # ← AUTO-CACHES pip packages ⚡
      
      - name: Install Dependencies
        run: |
          cd apps/python-app
          pip install -r requirements.txt
      
      - name: Run Tests
        run: |
          cd apps/python-app
          pytest
      
      - name: Lint
        run: |
          cd apps/python-app
          flake8 .

  # Deploy to Kubernetes (all apps passed)
  # TODO: Re-enable when a real cluster + KUBE_CONFIG secret are available.
  # Remove 'if: false' and restore the always()/result guard below.
  deploy:
    needs: [build-java, build-angular, build-python]
    if: false
    # if: |
    #   always() &&
    #   github.ref == 'refs/heads/main' &&
    #   !contains(needs.*.result, 'failure') &&
    #   !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
      - name: Deploy to K8s
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/java-app
          kubectl rollout status deployment/angular-app
